name: Claude Status Monitor

on:
  schedule:
    # Runs every 5 minutes (UTC). GitHub cron is best-effort and may drift/skip
    # during high load; offset from :00 to dodge top-of-hour congestion.
    - cron: '2-59/5 * * * *'
  workflow_dispatch: # allows manual trigger from the GitHub UI

permissions:
  contents: write

# Prevent overlapping runs from racing on the state.json commit
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node monitor.js
